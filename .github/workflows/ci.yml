name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust Code Quality & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./magpie_core

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ./magpie_core

    - name: Check Formatting
      run: cargo fmt -- --check

    - name: Lint with Clippy
      run: cargo clippy -- -D warnings
      
    - name: Run Tests
      run: cargo test

  python-check:
    name: Python Code Quality (Lint & Validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./magpie_agent
        
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install uv
      uses: astral-sh/setup-uv@v2
      with:
        enable-cache: true
        
    - name: Install dependencies
      run: uv sync
      
    # Although we don't have tests yet, we can enforce basic linting and error catching
    - name: Lint with Ruff (via uv)
      run: uv run ruff check .

    # Future integration: Pytest
    # - name: Run Pytest
    #   run: uv run pytest tests/
