name: "Tauri Release"

on:
  push:
    # 只要 push 触发，就打包一版测试
    branches:
      - main
    paths:
      - 'magpie_desktop/**'
      - '.github/workflows/tauri.yml'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: install frontend dependencies
        run: npm install
        working-directory: magpie_desktop

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: magpie_desktop
          tagName: app-v__VERSION__
          releaseName: "Magpie Desktop Edition v__VERSION__"
          releaseBody: "Automatic release generated by GitHub Actions. (Pre-Rust Engine Integration)"
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
